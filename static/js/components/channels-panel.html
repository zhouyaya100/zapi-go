<div v-if="tab==='channels'">
  <div class="flex items-center justify-between mb-4">
<h2 class="text-xl font-bold text-gray-800">{{t('channels')}}</h2>
<button @click="editingChId?cancelEditChannel():showAddCh=!showAddCh" :class="['px-4 py-2 rounded-xl text-sm font-medium transition',showAddCh?'bg-gray-200 text-gray-600':'bg-indigo-600 text-white hover:bg-indigo-700']">{{editingChId?t('cancel'):showAddCh?t('cancel'):'+ '+t('addChannel')}}</button>
</div>
  <div v-if="showAddCh||editingChId" class="bg-white rounded-xl border p-5 mb-4 fade-in">
    <div class="grid grid-cols-2 gap-3">
      <div>
<label class="text-xs text-gray-400 block mb-1">{{t('chName')}}</label>
<input v-model="ch.name" class="w-full px-3 py-2 rounded-lg border text-sm" :placeholder="t('chNamePh')">
</div>
      <div>
<label class="text-xs text-gray-400 block mb-1">{{t('chType')}}</label>
<select v-model="ch.type" class="w-full px-3 py-2 rounded-lg border text-sm">
<option>openai</option>
<option>anthropic</option>
<option>azure</option>
<option>custom</option>
</select>
</div>
      <div class="col-span-2">
<label class="text-xs text-gray-400 block mb-1">Base URL</label>
<input v-model="ch.base_url" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="https://api.openai.com/v1">
</div>
      <div class="col-span-2">
<label class="text-xs text-gray-400 block mb-1">API Key</label>
<input v-model="ch.api_key" type="password" @input="ch._api_key_changed=true" class="w-full px-3 py-2 rounded-lg border text-sm" :placeholder="editingChId&&!ch._api_key_changed?'留空不修改，输入新Key则替换':'sk-...'">
</div>
      <div class="col-span-2">
<label class="text-xs text-gray-400 block mb-1">{{t('externalModels')}} <span class="text-gray-300">({{t('externalModelsTip')}})</span>
</label>
<input v-model="ch.models" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="GLM-5.1, GPT-4o">
</div>
      <div class="col-span-2">
<label class="text-xs text-gray-400 block mb-1">{{t('upstreamModels')}} <span class="text-gray-300">({{t('upstreamModelsTip')}})</span>
</label>
<input v-model="ch.upstream_models" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="glm, gpt-4o-0613">
</div>
      <div class="col-span-2">
<label class="text-xs text-gray-400 block mb-1">{{t('allowedGroups')}}</label>
<div v-if="sysSet.groups.length" class="flex flex-wrap gap-2 mt-1">
<label v-for="g in sysSet.groups" :key="g.id" class="inline-flex items-center gap-1.5 text-sm bg-gray-50 px-3 py-1.5 rounded-lg cursor-pointer hover:bg-indigo-50 transition">
<input type="checkbox" :value="g.name" v-model="chAllowedGroups" class="rounded text-indigo-600"> {{g.name}}</label>
</div>
<div v-else class="text-xs text-gray-300">{{t('noGroupsTip')}}</div>
</div>
      <div>
<label class="text-xs text-gray-400 block mb-1">{{t('weight')}}</label>
<input v-model.number="ch.weight" type="number" class="w-full px-3 py-2 rounded-lg border text-sm">
</div>
      <div>
<label class="text-xs text-gray-400 block mb-1">{{t('priority')}}</label>
<input v-model.number="ch.priority" type="number" class="w-full px-3 py-2 rounded-lg border text-sm">
</div>
    </div>
    <div class="flex items-center gap-4 mt-3">
<label class="flex items-center gap-2 text-sm text-[#8b949e]">
<input type="checkbox" v-model="ch.auto_ban" class="rounded">{{t('autoBan')}}</label>
<button @click="editingChId?saveEditChannel():addChannel()" class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium">{{editingChId?t('save'):t('addChannel')}}</button>
</div>
  </div>
  <div v-if="channels.length" class="space-y-3">
    <div v-for="c in channels" :key="c.id" class="bg-white rounded-xl border p-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
<span :class="['w-2.5 h-2.5 rounded-full',c.enabled?'bg-green-400':'bg-red-300']">
</span>
<span class="font-semibold">{{c.name}}</span>
<span class="text-xs text-gray-400 bg-gray-50 px-2 py-0.5 rounded">{{c.type}}</span>
</div>
        <div class="flex items-center gap-2">
          <button @click="testChannel(c.id)" :disabled="testing[c.id]" class="px-3 py-1.5 rounded-lg text-xs border hover:bg-gray-50 disabled:opacity-50">{{testing[c.id]?t('testing')+'...':t('test')}}</button>
          <span v-if="testResults[c.id]" :class="['text-xs',testResults[c.id].success?'text-green-600':'text-red-500']">{{testResults[c.id].latency_ms}}ms ({{testResults[c.id].model}})</span>
          <button @click="toggleChannel(c)" class="px-3 py-1.5 rounded-lg text-xs border" :class="c.enabled?'border-red-200 text-red-500':'border-green-200 text-green-600'">{{c.enabled?t('disable'):t('enable')}}</button>
          <button @click="editChannel(c)" class="px-3 py-1.5 rounded-lg text-xs border border-indigo-200 text-indigo-500 hover:bg-indigo-50">{{t('edit')}}</button>
<button @click="delChannel(c.id)" class="px-3 py-1.5 rounded-lg text-xs border border-gray-200 text-gray-400 hover:text-red-500">{{t('delete')}}</button>
        </div>
      </div>
      <div class="mt-1 flex flex-wrap gap-1">
<span v-for="m in (c.models||'*').split(',')" :key="m" class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-mono">{{m.trim()}}</span>
<span v-for="g in (c.allowed_groups||'').split(',').map(x=>x.trim()).filter(x=>x&&x!=='__none__')" :key="g" class="text-xs bg-amber-50 text-amber-600 px-2 py-0.5 rounded ml-0.5">🏷️ {{g}}</span>
</div>
<div class="mt-1 flex items-center gap-3 text-xs text-gray-400">
<span v-if="c.fail_count">❌ 失败{{c.fail_count}}次</span>
<span v-if="c.response_time">⚡ {{c.response_time}}ms</span>
</div>
    </div>
  </div>
  <div v-else class="bg-white rounded-xl border p-12 text-center text-gray-300">{{t('noChannels')}}</div>
</div>
