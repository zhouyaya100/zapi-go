<div v-if="mrlEditor.show" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="mrlEditor.show=false">
  <div class="bg-white rounded-2xl shadow-2xl w-[480px] max-h-[80vh] overflow-hidden" @click.stop>
    <div class="px-5 py-4 border-b flex items-center justify-between"><h3 class="text-lg font-bold text-gray-800">模型访问策略</h3><button @click="mrlEditor.show=false" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button></div>
    <div class="p-5 overflow-y-auto max-h-[55vh] space-y-3">
      <div v-for="(rule,idx) in mrlEditor.rules" :key="idx" class="flex items-center gap-2 bg-gray-50 rounded-lg p-3"><div class="flex-1"><select v-model="rule.model" class="w-full px-2 py-1.5 rounded border text-sm"><option value="*">* (其他模型)</option><option v-for="m in poolModels" :key="m" :value="m">{{m}}</option></select></div><div class="w-24"><label class="text-[10px] text-gray-400">RPM</label><input v-model.number="rule.rpm" type="number" class="w-full px-2 py-1 rounded border text-sm text-center" placeholder="0"></div><div class="w-28"><label class="text-[10px] text-gray-400">TPM</label><input v-model.number="rule.tpm" type="number" class="w-full px-2 py-1 rounded border text-sm text-center" placeholder="0"></div><button @click="mrlEditor.rules.splice(idx,1)" class="text-red-400 hover:text-red-600 text-lg font-bold">&times;</button></div>
      <button @click="mrlEditor.rules.push({model:'*',rpm:0,tpm:0})" class="w-full py-2 rounded-lg border-2 border-dashed border-gray-200 text-gray-400 hover:border-indigo-300 hover:text-indigo-500 text-sm transition">+ 添加模型策略</button>
      <div class="text-xs text-gray-400 mt-2">提示：RPM/TPM 设 0 跟随全局，-1 不限制。“*”匹配未单独设置的模型。</div>
    </div>
    <div class="px-5 py-4 border-t flex gap-3 justify-end"><button @click="mrlEditor.show=false" class="px-4 py-2 rounded-lg border text-sm text-gray-500 hover:bg-gray-50">取消</button><button @click="saveMrlEditor()" class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700">保存</button></div>
  </div>
</div>
