<div v-if="tab==='groups'">
  <div class="flex items-center justify-between mb-4">
<h2 class="text-xl font-bold text-gray-800">🏷️ {{t('groups')}}</h2>
<button @click="showAddGrp=!showAddGrp" :class="['px-4 py-2 rounded-xl text-sm font-medium transition',showAddGrp?'bg-gray-200 text-gray-600':'bg-indigo-600 text-white hover:bg-indigo-700']">{{showAddGrp?t('cancel'):'+ '+t('addGroup')}}</button>
</div>
  <div v-if="showAddGrp" class="bg-white rounded-xl border p-5 mb-4 fade-in">
    <div class="grid grid-cols-2 gap-3">
      <div>
<label class="text-xs text-gray-400 block mb-1">{{t('grpName')}}</label>
<input v-model="newGrp.name" class="w-full px-3 py-2 rounded-lg border text-sm" :placeholder="t('grpNamePh')">
</div>
      <div>
<label class="text-xs text-gray-400 block mb-1">{{t('comment')}}</label>
<input v-model="newGrp.comment" class="w-full px-3 py-2 rounded-lg border text-sm">
</div>
    </div>
    <button @click="createGroup" class="mt-3 px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium">{{t('addGroup')}}</button>
  </div>
  <div v-if="groups.length" class="bg-white rounded-xl border overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b">
<tr>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-400">ID</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-400">{{t('grpName')}}</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-400">{{t('comment')}}</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-400">{{t('bindChannels')}}</th>
        <th class="px-4 py-3 text-center text-xs font-medium text-gray-400">访问策略</th>
        <th class="px-4 py-3 text-center text-xs font-medium text-gray-400">{{t('userCount')}}</th>
        <th class="px-4 py-3 text-center text-xs font-medium text-gray-400">{{t('actions')}}</th>
      </tr>
</thead>
      <tbody>
        <tr v-for="g in groups" :key="g.id" class="border-b border-gray-50">
          <td class="px-4 py-3 text-xs text-gray-400">{{g.id}}</td>
          <td class="px-4 py-3 font-medium">
<input v-model="g.name" class="px-2 py-1 rounded border text-sm w-32">
</td>
          <td class="px-4 py-3">
<input v-model="g.comment" class="px-2 py-1 rounded border text-sm w-full">
</td>
          <td class="px-4 py-3">
<div class="flex flex-wrap gap-1.5">
<label v-for="c in channels" :key="c.id" class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-lg cursor-pointer" :class="grpChannels(g).includes(c.id)?'bg-indigo-50 text-indigo-600':'bg-gray-50 text-gray-400 hover:bg-gray-100'">
<input type="checkbox" :value="c.id" :checked="grpChannels(g).includes(c.id)" @change="toggleGrpChannel(g,c,$event)" class="rounded text-indigo-600"> {{c.name}}</label>
<span v-if="!channels.length" class="text-xs text-gray-300">{{t('noChannels')}}</span>
</div>
</td>
          <td class="px-4 py-3 text-center text-xs">
<div class="flex flex-col gap-1">
<div class="flex gap-2 justify-center"><label class="flex items-center gap-1"><input type="radio" v-model="g.rate_mode" value="global" class="text-indigo-600"> RPM/TPM</label><label class="flex items-center gap-1"><input type="radio" v-model="g.rate_mode" value="per_model" class="text-indigo-600"> 模型策略</label></div>
<div v-if="g.rate_mode==='global'" class="flex gap-1 justify-center"><input v-model.number="g.rpm" type="number" class="w-14 px-1 py-0.5 rounded border text-xs text-center" placeholder="RPM"><input v-model.number="g.tpm" type="number" class="w-16 px-1 py-0.5 rounded border text-xs text-center" placeholder="TPM"></div>
<div v-if="g.rate_mode==='per_model'" class="text-center"><button @click="openMrlEditor(g,'group')" class="text-indigo-500 hover:text-indigo-700 font-medium">{{g.model_rate_limits?Object.keys(JSON.parse(g.model_rate_limits||'{}')).length+'个策略':'点击设置'}}</button></div>
</div>
</td>
          <td class="px-4 py-3 text-center">
<span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">{{g.user_count}}</span>
</td>
          <td class="px-4 py-3 text-center space-x-1">
            <button @click="updateGroup(g)" class="text-xs text-green-600 hover:underline">{{t('save')}}</button>
            <button @click="delGroup(g.id)" class="text-xs text-red-400 hover:underline">{{t('delete')}}</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div v-else class="bg-white rounded-xl border p-12 text-center text-gray-300">{{t('noGroups')}}</div>
</div>
