<div v-if="!authed" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/20 backdrop-blur mb-4">
<span class="text-3xl">⚡</span>
</div>
      <h1 class="text-3xl font-bold text-white">Zapi</h1>
      <p class="text-indigo-200 mt-1">统一模型管理工具</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl p-6">
      <div v-if="authMode==='login'">
        <div class="space-y-3">
          <input v-model="loginForm.username" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" :placeholder="t('username')" @keyup.enter="doLogin">
          <input v-model="loginForm.password" type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" :placeholder="t('password')" @keyup.enter="doLogin">
          <div class="flex gap-2 items-center">
            <input v-model="loginForm.captchaCode" class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" :placeholder="t('captchaCode')" @keyup.enter="doLogin">
            <img :src="captchaImg" @click="refreshCaptcha" class="h-10 rounded-lg cursor-pointer border border-gray-200 hover:border-indigo-300 transition" :title="t('clickRefresh')">
          </div>
        </div>
        <div v-if="authError" class="mt-2 text-red-500 text-xs">{{authError}}</div>
        <button @click="doLogin" class="w-full mt-4 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm transition">{{t('login')}}</button>
        <div class="mt-3 text-center">
<button @click="authMode='register';refreshCaptcha()" class="text-xs text-indigo-500 hover:underline">{{t('goRegister')}}</button>
</div>
      </div>
      <div v-else>
        <div v-if="!regOpen" class="p-4 bg-red-50 rounded-xl text-sm text-red-600 text-center mb-3">{{t('regClosed')}}</div>
        <template v-else>
        <div class="space-y-3">
          <input v-model="regForm.username" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" :placeholder="t('username')">
          <input v-model="regForm.password" type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" :placeholder="t('password')">
          <input v-model="regForm.password2" type="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" :placeholder="t('confirmPwd')">
          <div class="flex gap-2 items-center">
            <input v-model="regForm.captchaCode" class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm" :placeholder="t('captchaCode')">
            <img :src="captchaImg" @click="refreshCaptcha" class="h-10 rounded-lg cursor-pointer border border-gray-200 hover:border-indigo-300 transition" :title="t('clickRefresh')">
          </div>
        </div>
        <div v-if="authError" class="mt-2 text-red-500 text-xs">{{authError}}</div>
        <button @click="doRegister" class="w-full mt-4 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm transition">{{t('register')}}</button>
        <div class="mt-3 text-center">
<button @click="authMode='login';refreshCaptcha()" class="text-xs text-indigo-500 hover:underline">{{t('goLogin')}}</button>
</div>
        </template>
      </div>
    </div>
    <p class="text-center text-xs text-indigo-300 mt-4">Zapi v{{appVersion}}</p>
  </div>
</div>
