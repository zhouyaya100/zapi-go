<div v-if="showResetPwd" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="showResetPwd=false">
  <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
    <h3 class="font-bold text-gray-800 mb-4">{{t('resetPwd')}} - {{resetPwdUser?.username}}</h3>
    <div v-if="resetPwdResult" class="p-3 bg-green-50 border border-green-100 rounded-lg text-sm text-green-700 mb-3">
      <div class="font-medium mb-1">{{t('pwdResetTo')}}:</div>
      <div class="font-mono text-lg bg-white p-2 rounded border">{{resetPwdResult}}</div>
      <button @click="copyKey(resetPwdResult)" class="mt-2 px-3 py-1 rounded-md bg-green-100 text-green-700 text-xs font-medium hover:bg-green-200 transition">{{t('copy')}}</button>
    </div>
    <div v-else class="text-sm text-[#8b949e] mb-3">{{t('deleteConfirm')}}</div>
    <div class="flex gap-2">
      <button v-if="!resetPwdResult" @click="doResetPwd" class="flex-1 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium">{{t('confirm')}}</button>
      <button @click="showResetPwd=false;resetPwdResult=''" class="flex-1 py-2 rounded-lg border text-sm">{{t('cancel')}}</button>
    </div>
  </div>
</div>
