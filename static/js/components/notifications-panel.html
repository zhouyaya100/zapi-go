<div v-if="tab==='notifications'" class="space-y-3">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-bold text-gray-800">🔔 {{t('notifications')}}</h2>
    <div class="flex gap-2">
      <button v-if="notifTab==='inbox' && unreadCount>0" @click="markAllRead" class="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">{{t('markAllRead')}}</button>
      <button v-if="isAdmin" @click="showSendNotif=true" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">+ {{t('sendNotif')}}</button>
    </div>
  </div>

  <!-- Tab -->
  <div class="flex gap-1 bg-gray-100 rounded-xl p-1">
    <button @click="notifTab='inbox';loadNotifications()" :class="['flex-1 py-2 rounded-lg text-sm font-medium transition',notifTab==='inbox'?'bg-white shadow text-indigo-700':'text-[#8b949e] hover:text-gray-700']">📥 {{t('inboxTab')}} <span v-if="unreadCount>0" class="ml-1 bg-red-500 text-white text-xs px-1.5 rounded-full">{{unreadCount>99?'99+':unreadCount}}</span>
</button>
    <button v-if="isAdmin" @click="notifTab='sent';loadSentNotifications()" :class="['flex-1 py-2 rounded-lg text-sm font-medium transition',notifTab==='sent'?'bg-white shadow text-indigo-700':'text-[#8b949e] hover:text-gray-700']">📤 {{t('sentTab')}}</button>
  </div>

  <!-- Filters -->
  <div class="flex gap-2 flex-wrap">
    <select v-model="notifFilter.category" @change="notifTab==='inbox'?loadNotifications():loadSentNotifications()" class="px-3 py-1.5 rounded-lg border text-sm bg-white">
      <option value="">{{t('all')}}</option>
      <option value="fault">🔴 {{t('faultNotif')}}</option>
      <option value="recovery">🟢 {{t('recoveryNotif')}}</option>
      <option value="info">🔵 {{t('infoNotif')}}</option>
    </select>
    <select v-if="notifTab==='inbox'" v-model="notifFilter.read" @change="loadNotifications" class="px-3 py-1.5 rounded-lg border text-sm bg-white">
      <option value="">{{t('all')}}</option>
      <option value="false">{{t('unread')}}</option>
      <option value="true">{{t('read')}}</option>
    </select>
  </div>

  <!-- Inbox -->
  <template v-if="notifTab==='inbox'">
    <div v-if="!notifItems.length" class="bg-white rounded-xl border p-10 text-center text-gray-300 text-sm">📭 {{t('noNotifications')}}</div>
    <div v-for="n in notifItems" :key="n.id" :class="['rounded-xl border p-4 transition cursor-pointer',n.read?'bg-gray-50 opacity-60':'bg-white shadow-sm','border-l-4',n.category==='fault'?'border-l-red-500':n.category==='recovery'?'border-l-emerald-500':'border-l-blue-400']" @click="!n.read&&markRead(n.id)">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span v-if="n.category==='fault'" class="text-red-500 text-xs font-semibold bg-red-50 px-2 py-0.5 rounded">🔴 {{t('faultNotif')}}</span>
            <span v-else-if="n.category==='recovery'" class="text-emerald-600 text-xs font-semibold bg-emerald-50 px-2 py-0.5 rounded">🟢 {{t('recoveryNotif')}}</span>
            <span v-else class="text-blue-500 text-xs font-semibold bg-blue-50 px-2 py-0.5 rounded">🔵 {{t('infoNotif')}}</span>
            <span class="font-semibold text-sm text-gray-800">{{n.title}}</span>
            <span v-if="!n.read" class="bg-red-500 text-white text-xs px-1.5 rounded-full animate-pulse">NEW</span>
          </div>
          <div v-if="n.content" class="mt-1.5 text-sm text-[#8b949e] whitespace-pre-wrap line-clamp-2">{{n.content}}</div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="text-xs text-gray-300">{{fmtTime(n.created_at)}}</span>
          <button @click.stop="delNotif(n.id)" class="text-gray-300 hover:text-red-500 text-sm p-1 rounded hover:bg-red-50" title="删除">✕</button>
        </div>
      </div>
    </div>
    <div v-if="notifItems.length<notifTotal" class="text-center py-2">
      <button @click="loadMoreNotif" class="text-sm text-indigo-500 hover:underline">{{t('loadMore')}}</button>
    </div>
  </template>

  <!-- Sent (Admin) -->
  <template v-if="notifTab==='sent' && isAdmin">
    <div v-if="!sentItems.length" class="bg-white rounded-xl border p-10 text-center text-gray-300 text-sm">📭 {{t('noNotifications')}}</div>
    <div v-for="n in sentItems" :key="n.id" :class="['bg-white rounded-xl border p-4 border-l-4',n.category==='fault'?'border-l-red-500':n.category==='recovery'?'border-l-emerald-500':'border-l-emerald-400']">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span v-if="n.category==='fault'" class="text-red-500 text-xs font-semibold bg-red-50 px-2 py-0.5 rounded">🔴 {{t('faultNotif')}}</span>
            <span v-else-if="n.category==='recovery'" class="text-emerald-600 text-xs font-semibold bg-emerald-50 px-2 py-0.5 rounded">🟢 {{t('recoveryNotif')}}</span>
            <span v-else class="text-blue-500 text-xs font-semibold bg-blue-50 px-2 py-0.5 rounded">🔵 {{t('infoNotif')}}</span>
            <span class="font-semibold text-sm text-gray-800">{{n.title}}</span>
          </div>
          <div v-if="n.content" class="mt-1.5 text-sm text-[#8b949e] whitespace-pre-wrap line-clamp-2">{{n.content}}</div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="text-xs text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">👥 {{n.recipient_count||1}}</span>
          <span class="text-xs text-gray-300">{{fmtTime(n.created_at)}}</span>
          <button @click.stop="delSentNotif(n.id)" class="text-gray-300 hover:text-red-500 text-sm p-1 rounded hover:bg-red-50" title="删除">✕</button>
        </div>
      </div>
    </div>
    <div v-if="sentItems.length<sentTotal" class="text-center py-2">
      <button @click="loadMoreNotif" class="text-sm text-indigo-500 hover:underline">{{t('loadMore')}}</button>
    </div>
  </template>
</div>

<!-- Delete Confirm Modal -->
<div v-if="showDelConfirm" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="showDelConfirm=false">
  <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
    <h3 class="font-bold text-gray-800 mb-2">⚠️ {{delConfirmTitle}}</h3>
    <p class="text-sm text-[#8b949e] mb-4">{{delConfirmMsg}}</p>
    <div class="flex justify-end gap-3">
      <button @click="showDelConfirm=false" class="px-4 py-2 rounded-lg text-sm border hover:bg-gray-50">{{t('cancel')}}</button>
      <button @click="doDelConfirm" :class="['px-4 py-2 rounded-lg text-sm text-white',delConfirmDanger?'bg-red-600 hover:bg-red-700':'bg-indigo-600 hover:bg-indigo-700']">{{delConfirmBtn}}</button>
    </div>
  </div>
</div>

<!-- Send Notification Modal -->
<div v-if="showSendNotif" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="showSendNotif=false">
  <div class="bg-white rounded-2xl p-6 w-[480px] shadow-xl">
    <h3 class="font-bold text-gray-800 mb-4">📢 {{t('sendNotif')}}</h3>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-gray-400 block mb-1">{{t('notifCategory')}}</label>
        <select v-model="sendNotifForm.category" class="w-full px-3 py-2 rounded-lg border text-sm">
          <option value="info">🔵 {{t('infoNotif')}}</option>
          <option value="fault">🔴 {{t('faultNotif')}}</option>
          <option value="recovery">🟢 {{t('recoveryNotif')}}</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-400 block mb-1">{{t('notifTitle')}}</label>
        <input v-model="sendNotifForm.title" class="w-full px-3 py-2 rounded-lg border text-sm" :placeholder="t('notifTitlePh')">
      </div>
      <div>
        <label class="text-xs text-gray-400 block mb-1">{{t('notifContent')}}</label>
        <textarea v-model="sendNotifForm.content" class="w-full px-3 py-2 rounded-lg border text-sm h-24 resize-none" :placeholder="t('notifContentPh')">
</textarea>
      </div>
      <div>
        <label class="text-xs text-gray-400 block mb-1">{{t('notifReceiver')}}</label>
        <select v-model="sendNotifForm.mode" class="w-full px-3 py-2 rounded-lg border text-sm">
          <option value="broadcast">📢 {{t('broadcastAll')}}</option>
          <option value="single">👤 {{t('singleUser')}}</option>
          <option value="batch">👥 {{t('batchUsers')}}</option>
        </select>
      </div>
      <div v-if="sendNotifForm.mode==='single'">
        <label class="text-xs text-gray-400 block mb-1">{{t('selectUser')}}</label>
        <select v-model="sendNotifForm.receiver_id" class="w-full px-3 py-2 rounded-lg border text-sm">
          <option :value="null">--</option>
          <option v-for="u in users" :key="u.id" :value="u.id">{{u.username}} ({{u.role}})</option>
        </select>
      </div>
      <div v-if="sendNotifForm.mode==='batch'">
        <label class="text-xs text-gray-400 block mb-1">{{t('selectUsers')}}</label>
        <div class="max-h-40 overflow-y-auto border rounded-lg p-2 space-y-1">
          <label v-for="u in users" :key="u.id" class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" :value="u.id" v-model="sendNotifForm.receiver_ids" class="rounded">
            <span>{{u.username}} ({{u.role}})</span>
          </label>
        </div>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-4">
      <button @click="showSendNotif=false" class="px-4 py-2 rounded-lg text-sm border hover:bg-gray-50">{{t('cancel')}}</button>
      <button @click="doSendNotif" class="px-4 py-2 rounded-lg text-sm bg-emerald-600 text-white hover:bg-emerald-700">{{t('send')}}</button>
    </div>
  </div></div>
